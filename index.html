<script>
// ===================== DATA LAYER =====================
const DB={
  _g(k){try{return JSON.parse(localStorage.getItem('sc_'+k))||[]}catch{return[]}},
  _s(k,d){localStorage.setItem('sc_'+k,JSON.stringify(d))},
  _id(){return Date.now().toString(36)+Math.random().toString(36).substr(2,9)},
  // Users
  users(){return this._g('users')},saveUsers(u){this._s('users',u)},
  userByEmail(e){return this.users().find(u=>u.email===e)},
  userById(id){return this.users().find(u=>u.id===id)},
  createUser(d){const u={id:this._id(),...d,createdAt:new Date().toISOString()};const a=this.users();a.push(u);this.saveUsers(a);return u},
  // Stores
  stores(){return this._g('stores')},saveStores(s){this._s('stores',s)},
  storeByUser(uid){return this.stores().find(s=>s.userId===uid)},
  storeById(id){return this.stores().find(s=>s.id===id)},
  createStore(d){const s={id:this._id(),...d,createdAt:new Date().toISOString()};const a=this.stores();a.push(s);this.saveStores(a);return s},
  updateStore(id,d){const a=this.stores();const i=a.findIndex(s=>s.id===id);if(i>-1){a[i]={...a[i],...d};this.saveStores(a)}return a[i]},
  // Products
  products(){return this._g('products')},saveProducts(p){this._s('products',p)},
  productsByStore(sid){return this.products().filter(p=>p.storeId===sid)},
  productById(id){return this.products().find(p=>p.id===id)},
  createProduct(d){const p={id:this._id(),...d,createdAt:new Date().toISOString()};const a=this.products();a.push(p);this.saveProducts(a);return p},
  updateProduct(id,d){const a=this.products();const i=a.findIndex(p=>p.id===id);if(i>-1){a[i]={...a[i],...d};this.saveProducts(a)}return a[i]},
  deleteProduct(id){this.saveProducts(this.products().filter(p=>p.id!==id))},
  // Orders
  orders(){return this._g('orders')},saveOrders(o){this._s('orders',o)},
  ordersByStore(sid){return this.orders().filter(o=>o.storeId===sid).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))},
  createOrder(d){const o={id:this._id(),status:'new',...d,createdAt:new Date().toISOString()};const a=this.orders();a.push(o);this.saveOrders(a);return o},
  updateOrder(id,d){const a=this.orders();const i=a.findIndex(o=>o.id===id);if(i>-1){a[i]={...a[i],...d};this.saveOrders(a)}return a[i]}
};

// ===================== AUTH =====================
const Auth={
  _u:null,
  init(){try{const s=sessionStorage.getItem('sc_session');if(s)this._u=JSON.parse(s)}catch{}},
  login(e,p){const u=DB.userByEmail(e);if(!u)return{error:'No account found with that email'};if(u.password!==p)return{error:'Incorrect password'};this._u=u;sessionStorage.setItem('sc_session',JSON.stringify(u));return{user:u}},
  register(n,e,p){if(DB.userByEmail(e))return{error:'An account with that email already exists'};const u=DB.createUser({name:n,email:e,password:p});DB.createStore({userId:u.id,name:n+"'s Store",tagline:'Your store tagline goes here',description:'',logo:'',accentColor:'#C4653A',currency:'USD'});this._u=u;sessionStorage.setItem('sc_session',JSON.stringify(u));return{user:u}},
  logout(){this._u=null;sessionStorage.removeItem('sc_session')},
  user(){return this._u},
  ok(){return!!this._u}
};

// ===================== CART =====================
const Cart={
  _i:[],
  init(){try{const s=sessionStorage.getItem('sc_cart');if(s)this._i=JSON.parse(s)}catch{}},
  _s(){sessionStorage.setItem('sc_cart',JSON.stringify(this._i))},
  add(p,q=1){const e=this._i.find(i=>i.id===p.id);if(e)e.qty+=q;else this._i.push({...p,qty:q});this._s()},
  remove(pid){this._i=this._i.filter(i=>i.id!==pid);this._s()},
  updateQty(pid,q){const i=this._i.find(x=>x.id===pid);if(i){i.qty=Math.max(1,q);this._s()}},
  items(){return this._i},total(){return this._i.reduce((s,i)=>s+i.price*i.qty,0)},count(){return this._i.reduce((s,i)=>s+i.qty,0)},
  clear(){this._i=[];this._s()}
};

// ===================== TOAST =====================
function toast(msg,type='success'){
  const c=document.getElementById('toast-container');
  const cls={success:'bg-green-900 text-green-100',error:'bg-red-900 text-red-100',info:'bg-bark text-cream'};
  const ico={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
  const el=document.createElement('div');
  el.className=`${cls[type]} px-5 py-3 rounded-xl shadow-lg flex items-center gap-3 text-sm font-medium pointer-events-auto toast-enter`;
  el.innerHTML=`<i class="fas ${ico[type]}"></i><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(40px)';el.style.transition='all .3s';setTimeout(()=>el.remove(),300)},3200);
}

// ===================== MODAL =====================

}
function closeModal(){const c=document.getElementById('modal-container');c.className='fixed inset-0 z-[9998] hidden';c.innerHTML=''}

// ===================== HELPERS =====================
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtPrice(p,c='USD'){return new Intl.NumberFormat('en-US',{style:'currency',currency:c}).format(p)}
function fmtDate(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1e3);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function statusBadge(s){
  const m={new:['bg-blue-50 text-blue-700','New'],processing:['bg-amber-50 text-amber-700','Processing'],shipped:['bg-purple-50 text-purple-700','Shipped'],delivered:['bg-green-50 text-green-700','Delivered'],cancelled:['bg-red-50 text-red-700','Cancelled']};
  const[l,t]=m[s]||['bg-gray-50 text-gray-600',s];
  return`<span class="px-2.5 py-1 rounded-full text-xs font-medium ${l}">${t}</span>`
}
function placeholderImg(w=400,h=400){return`https://picsum.photos/seed/${Math.random().toString(36).substr(2,6)}/${w}/${h}.jpg`}

// ===================== ROUTER =====================
const Router={
  routes:{},
  on(p,h){this.routes[p]=h},
  go(p){window.location.hash=p},
  resolve(){
    const h=window.location.hash.slice(1)||'/';
    if(this.routes[h])return this.routes[h]();
    for(const[p,fn]of Object.entries(this.routes)){
      const rx=new RegExp('^'+p.replace(/:\w+/g,'([^/]+)')+'$');
      const m=h.match(rx);
      if(m)return fn(...m.slice(1));
    }
    this.routes['/']?.();
  },
  init(){window.addEventListener('hashchange',()=>this.resolve());this.resolve()}
};

function pageProductForm(editId){
  const u=Auth.user(),st=DB.storeByUser(u.id);
  const p=editId?DB.productById(editId):null;
  const isEdit=!!p;
  const existingCats=[...new Set(DB.productsByStore(st.id).map(x=>x.category).filter(Boolean))];
  document.getElementById('app').innerHTML=adminLayout(`
    <div class="mb-8"><a href="#/products" class="text-sm text-muted hover:text-bark transition-colors"><i class="fas fa-arrow-left mr-1"></i>Back to Products</a><h1 class="font-display text-2xl font-bold mt-3">${isEdit?'Edit Product':'Add New Product'}</h1></div>
    <form data-form="${isEdit?'edit-product':'new-product'}" data-id="${editId||''}" class="space-y-6 max-w-2xl">
      <div class="bg-white rounded-xl border border-sand/50 p-6 space-y-5">
        <h2 class="font-display font-semibold">Details</h2>
        <div><label class="block text-sm font-medium mb-1.5">Product Name</label><input type="text" name="name" value="${esc(p?.name||'')}" required class="w-full px-4 py-3 rounded-lg border border-sand bg-white focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra text-sm" placeholder="e.g. Wild Berry Jam"></div>
        <div><label class="block text-sm font-medium mb-1.5">Description</label><textarea name="description" rows="4" class="w-full px-4 py-3 rounded-lg border border-sand bg-white focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra text-sm resize-none" placeholder="Describe your product — ingredients, story, how to use it...">${esc(p?.description||'')}</textarea></div>
        <div class="grid sm:grid-cols-2 gap-5">
          <div><label class="block text-sm font-medium mb-1.5">Price</label><div class="relative"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm">$</span><input type="number" name="price" value="${p?.price||''}" required min="0" step="0.01" class="w-full pl-7 pr-4 py-3 rounded-lg border border-sand bg-white focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra text-sm" placeholder="0.00"></div></div>
          <div><label class="block text-sm font-medium mb-1.5">Category</label><input type="text" name="category" value="${esc(p?.category||'')}" list="cat-list" class="w-full px-4 py-3 rounded-lg border border-sand bg-white focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra text-sm" placeholder="e.g. Preserves"><datalist id="cat-list">${existingCats.map(c=>`<option value="${esc(c)}">`).join('')}</datalist></div>
        </div>
      </div>
      <div class="bg-white rounded-xl border border-sand/50 p-6 space-y-5">
        <h2 class="font-display font-semibold">Image</h2>
        <div class="drop-zone rounded-xl p-8 text-center cursor-pointer" id="drop-zone" data-action="trigger-upload">
          <div id="img-preview">${p?.image?`<img src="${esc(p.image)}" class="max-h-48 mx-auto rounded-lg object-contain">`:`<div class="text-muted"><i class="fas fa-cloud-upload-alt text-3xl mb-3 block text-sand"></i><p class="text-sm font-medium">Click or drag an image here</p><p class="text-xs mt-1">or paste a URL below</p></div>`}</div>
          <input type="file" name="file" accept="image/*" class="hidden" id="file-input">
        </div>
        <div><label class="block text-sm font-medium mb-1.5">Or paste image URL</label><input type="url" name="image" value="${esc(p?.image||'')}" class="w-full px-4 py-3 rounded-lg border border-sand bg-white focus:outline-none focus:ring-2 focus:ring-terra/30 focus:border-terra text-sm" placeholder="https://example.com/product.jpg" id="img-url-input"></div>
      </div>
      <div class="bg-white rounded-xl border border-sand/50 p-6 space-y-5">
        <h2 class="font-display font-semibold">Options</h2>
        <div class="flex flex-wrap gap-6">
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" name="inStock" ${p?.inStock!==false?'checked':''} class="w-4 h-4 rounded border-sand text-terra focus:ring-terra/30"><span class="text-sm">In Stock</span></label>
          <label class="flex items-center gap-3 cursor-pointer"><input type="checkbox" name="featured" ${p?.featured?'checked':''} class="w-4 h-4 rounded border-sand text-terra focus:ring-terra/30"><span class="text-sm">Featured Product</span></label>
        </div>
      </div>
      <div class="flex gap-3">
        <button type="submit" class="bg-terra text-white px-8 py-3 rounded-lg hover:bg-terra-light transition-colors font-medium text-sm">${isEdit?'Save Changes':'Add Product'}</button>
        <a href="#/products" class="px-6 py-3 rounded-lg border border-sand hover:bg-sand-light transition-colors text-sm font-medium">Cancel</a>
      </div>
    </form>
  `,'products');
  // File upload handling
  let uploadedDataUrl='';
  const dropZone=document.getElementById('drop-zone');
  const fileInput=document.getElementById('file-input');
  const imgUrlInput=document.getElementById('img-url-input');
  function handleFile(file){
    if(!file||!file.type.startsWith('image/'))return toast('Please select an image file','error');
    if(file.size>2*1024*1024)return toast('Image must be under 2MB','error');
    const r=new FileReader();
    r.onload=e=>{uploadedDataUrl=e.target.result;document.getElementById('img-preview').innerHTML=`<img src="${uploadedDataUrl}" class="max-h-48 mx-auto rounded-lg object-contain">`;imgUrlInput.value=''};
    r.readAsDataURL(file);
  }
  dropZone?.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
  dropZone?.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
  dropZone?.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});
  fileInput?.addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0])});
  imgUrlInput?.addEventListener('input',e=>{if(e.target.value){uploadedDataUrl='';document.getElementById('img-preview').innerHTML=e.target.value?`<img src="${esc(e.target.value)}" class="max-h-48 mx-auto rounded-lg object-contain" onerror="this.parentElement.innerHTML='<div class=\\'text-muted\\'><i class=\\'fas fa-exclamation-triangle text-xl mb-2 block text-red-400\\'></i><p class=\\'text-xs\\'>Could not load image</p></div>'">`:'<div class="text-muted"><i class="fas fa-cloud-upload-alt text-3xl mb-3 block text-sand"></i><p class="text-sm font-medium">Click or drag an image here</p></div>'}});
  window._getUploadedImg=()=>uploadedDataUrl;
}

// ===================== CART DRAWER =====================
function renderCartDrawer(storeId){
  const st=DB.storeById(storeId);
  if(!st)return;
  const accent=st.accentColor||'#C4653A';
  const items=Cart.items();
  const panel=document.getElementById('cart-panel');
  panel.style.setProperty('--accent',accent);
  document.getElementById('cart-items').innerHTML=items.length?`<div class="space-y-4">${items.map(i=>`
    <div class="flex gap-4">
      <div class="w-16 h-16 rounded-lg bg-sand-light shrink-0 overflow-hidden">${i.image?`<img src="${esc(i.image)}" class="w-full h-full object-cover" alt="">`:`<div class="w-full h-full flex items-center justify-center text-sand text-xs"><i class="fas fa-image"></i></div>`}</div>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm truncate">${esc(i.name)}</div>
        <div class="text-xs text-muted mt-0.5">${fmtPrice(i.price,st.currency)} each</div>
        <div class="flex items-center gap-2 mt-2">
          <button data-action="cart-qty" data-id="${i.id}" data-delta="-1" class="w-7 h-7 rounded-md border border-sand flex items-center justify-center text-xs hover:bg-sand-light transition-colors">-</button>
          <span class="text-sm font-medium w-6 text-center">${i.qty}</span>
          <button data-action="cart-qty" data-id="${i.id}" data-delta="1" class="w-7 h-7 rounded-md border border-sand flex items-center justify-center text-xs hover:bg-sand-light transition-colors">+</button>
        </div>
      </div>
      <button data-action="cart-remove" data-id="${i.id}" class="text-muted hover:text-red-500 transition-colors self-start mt-1"><i class="fas fa-times text-xs"></i></button>
    </div>`).join('')}</div>`:`<div class="text-center py-12 text-muted"><i class="fas fa-shopping-bag text-3xl mb-3 block text-sand"></i><p class="text-sm">Your cart is empty</p></div>`;
  document.getElementById('cart-footer').innerHTML=items.length?`
    <div class="flex items-center justify-between mb-4"><span class="font-medium">Total</span><span class="text-xl font-bold">${fmtPrice(Cart.total(),st.currency)}</span></div>
    <button data-action="open-checkout" data-store="${st.id}" class="w-full py-3.5 rounded-lg text-white font-medium text-sm hover:opacity-90 transition-opacity" style="background:${accent}">Checkout</button>
  `:'';
}

function openCartDrawer(storeId){
  renderCartDrawer(storeId);
  document.getElementById('cart-drawer').classList.remove('hidden');
  document.body.style.overflow='hidden';
}
function closeCartDrawer(){
  document.getElementById('cart-drawer').classList.add('hidden');
  document.body.style.overflow='';
}

      <div class="p-6">
        <p class="text-[10px] uppercase tracking-widest font-semibold mb-2" style="color:${accent}">${esc(p.category||'')}</p>
        <h2 class="font-display text-2xl font-bold mb-3">${esc(p.name)}</h2>

        <p class="text-sm text-muted leading-relaxed mb-6">${esc(p.description)}</p>

// ===================== DELETE CONFIRMATION =====================
function confirmDelete(productId,productName){
  showModal(`
    <div class="p-6 text-center">
      <div class="w-14 h-14 rounded-2xl bg-red-50 flex items-center justify-center mx-auto mb-4"><i class="fas fa-exclamation-triangle text-red-500 text-xl"></i></div>
      <h3 class="font-display text-lg font-bold mb-2">Delete Product</h3>
      <p class="text-sm text-muted mb-6">Are you sure you want to delete <strong>${esc(productName)}</strong>? This action cannot be undone.</p>
      <div class="flex gap-3 justify-center">
        <button data-action="close-modal" class="px-6 py-2.5 rounded-lg border border-sand hover:bg-sand-light transition-colors text-sm font-medium">Cancel</button>
        <button data-action="confirm-delete" data-id="${productId}" class="px-6 py-2.5 rounded-lg bg-red-600 text-white hover:bg-red-700 transition-colors text-sm font-medium">Delete</button>
      </div>
    </div>
  `);
}

// ===================== EVENT HANDLING =====================
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn)return;
  const action=btn.dataset.action;
  const id=btn.dataset.id;

  if(action==='close-modal'){closeModal();return}
  if(action==='close-cart'){closeCartDrawer();return}
  if(action==='close-sidebar'){document.getElementById('sidebar')?.classList.add('-translate-x-full');document.getElementById('sidebar-overlay')?.classList.add('hidden');return}
  if(action==='toggle-sidebar'){document.getElementById('sidebar')?.classList.toggle('-translate-x-full');document.getElementById('sidebar-overlay')?.classList.toggle('hidden');return}
  if(action==='logout'){Auth.logout();Cart.clear();Router.go('/');return}

  if(action==='trigger-upload'){document.getElementById('file-input')?.click();return}

  if(action==='delete-product'){const p=DB.productById(id);if(p)confirmDelete(id,p.name);return}
  if(action==='confirm-delete'){DB.deleteProduct(id);closeModal();toast('Product deleted');Router.resolve();return}

  if(action==='update-order-status'){const sel=btn;DB.updateOrder(id,{status:sel.value});toast('Order status updated');return}

  if(action==='open-cart'){const hash=window.location.hash.slice(1);const sid=hash.replace('/store/','');openCartDrawer(sid);return}
  if(action==='close-cart'){closeCartDrawer();return}
  if(action==='cart-remove'){Cart.remove(id);const hash=window.location.hash.slice(1);renderCartDrawer(hash.replace('/store/',''));Router.resolve();return}
  if(action==='cart-qty'){Cart.updateQty(id,Cart.items().find(i=>i.id===id).qty+parseInt(btn.dataset.delta));const hash=window.location.hash.slice(1);renderCartDrawer(hash.replace('/store/',''));Router.resolve();return}
  if(action==='open-checkout'){closeCartDrawer();showCheckout(btn.dataset.store);return}

  if(action==='add-to-cart'){const p=DB.productById(id);if(p){Cart.add(p);toast('Added to cart');const hash=window.location.hash.slice(1);const sid=hash.replace('/store/','');renderCartDrawer(sid);Router.resolve()}return}

  if(action==='view-product'){const hash=window.location.hash.slice(1);const sid=hash.replace('/store/','');showProductDetail(id,sid);return}

  if(action==='filter-cat'){
    const cat=btn.dataset.cat;
    const cards=document.querySelectorAll('.product-card');
    const accent=window._storeAccent||'#C4653A';
    document.querySelectorAll('#cat-filters button').forEach(b=>{
      if(b.dataset.cat===cat){b.style.background=accent;b.style.color='white';b.style.borderColor=accent+'30'}
      else{b.style.background='transparent';b.style.color=accent;b.style.borderColor='#E8DFD4'}
    });
    cards.forEach(c=>{
      if(!cat||c.dataset.category===cat){c.style.display='';c.style.animation='fadeUp .3s ease both'}
      else c.style.display='none'
    });
    return
  }
});

document.addEventListener('submit',e=>{
  const form=e.target.closest('[data-form]');
  if(!form)return;
  e.preventDefault();
  const fd=new FormData(form);
  const data=Object.fromEntries(fd.entries());
  const type=form.dataset.form;

  if(type==='login'){
    const errEl=document.getElementById('login-error');
    const res=Auth.login(data.email,data.password);
    if(res.error){errEl.textContent=res.error;errEl.classList.remove('hidden')}else{errEl?.classList.add('hidden');Router.go('/dashboard')}
  }
  else if(type==='register'){
    const errEl=document.getElementById('reg-error');
    const res=Auth.register(data.name,data.email,data.password);
    if(res.error){errEl.textContent=res.error;errEl.classList.remove('hidden')}else{errEl?.classList.add('hidden');Router.go('/dashboard')}
  }
  else if(type==='save-settings'){
    DB.updateStore(DB.storeByUser(Auth.user().id).id,{name:data.name,tagline:data.tagline,description:data.description,accentColor:data.accentColor,currency:data.currency,logo:data.image});
    toast('Store settings saved');Router.resolve();
  }
  else if(type==='new-product'){
    const st=DB.storeByUser(Auth.user().id);
    const img=window._getUploadedImg?.()||data.image||'';
    DB.createProduct({storeId:st.id,name:data.name,description:data.description,price:parseFloat(data.price)||0,category:data.category,image:img,inStock:!!data.inStock,featured:!!data.featured});
    toast('Product added');Router.go('/products');
  }
  else if(type==='edit-product'){
    const img=window._getUploadedImg?.()||data.image||'';
    DB.updateProduct(form.dataset.id,{name:data.name,description:data.description,price:parseFloat(data.price)||0,category:data.category,image:img,inStock:!!data.inStock,featured:!!data.featured});
    toast('Product updated');Router.go('/products');
  }
  else if(type==='checkout'){
    const st=DB.storeById(form.dataset.store);
    DB.createOrder({storeId:st.id,customerName:data.name,customerEmail:data.email,items:Cart.items().map(i=>({productId:i.id,name:i.name,price:i.price,qty:i.qty})),total:Cart.total()});
    Cart.clear();closeModal();toast('Order placed successfully!');Router.resolve();
  }
});

// ===================== ROUTES =====================
Router.on('/',()=>{if(Auth.ok())Router.go('/dashboard');else pageLanding()});
Router.on('/login',()=>{if(Auth.ok())Router.go('/dashboard');else pageLogin()});
Router.on('/register',()=>{if(Auth.ok())Router.go('/dashboard');else pageRegister()});
Router.on('/dashboard',()=>{if(!Auth.ok())return Router.go('/login');pageDashboard()});
Router.on('/settings',()=>{if(!Auth.ok())return Router.go('/login');pageSettings()});
Router.on('/products',()=>{if(!Auth.ok())return Router.go('/login');pageProducts()});
Router.on('/products/new',()=>{if(!Auth.ok())return Router.go('/login');pageProductForm()});
Router.on('/products/:id/edit',(id)=>{if(!Auth.ok())return Router.go('/login');pageProductForm(id)});
Router.on('/orders',()=>{if(!Auth.ok())return Router.go('/login');pageOrders()});
Router.on('/store/:id',(id)=>pageStorefront(id));

// ===================== INIT =====================
seedData();
Auth.init();
Cart.init();
Router.init();
</script>
